<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF8F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5EDE3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C86B4F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B85840;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6B9B7D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A7C5C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  
  <!-- 档案册/书本主体 -->
  <g transform="translate(106, 90)">
    <!-- 书的阴影 -->
    <rect x="8" y="8" width="284" height="332" rx="20" fill="#D4B896" opacity="0.3"/>
    
    <!-- 书的封面（右侧） -->
    <rect x="80" y="0" width="204" height="332" rx="16" fill="url(#bookGrad)"/>
    
    <!-- 书的书脊（左侧） -->
    <rect x="0" y="0" width="84" height="332" rx="16" fill="#3D6B4E"/>
    
    <!-- 书脊装饰线 -->
    <line x1="42" y1="50" x2="42" y2="280" stroke="#6B9B7D" stroke-width="2" opacity="0.5" stroke-dasharray="8 8"/>
    
    <!-- 封面装饰 - 顶部标签 -->
    <rect x="110" y="40" width="144" height="50" rx="8" fill="#FFF9F2" opacity="0.95"/>
    <text x="182" y="72" font-family="serif" font-size="22" font-weight="bold" fill="#4A7C5C" text-anchor="middle">物 历</text>
    
    <!-- 封面装饰 - 印章 -->
    <circle cx="182" cy="180" r="56" fill="url(#sealGrad)" opacity="0.9"/>
    <circle cx="182" cy="180" r="48" fill="none" stroke="#FFF9F2" stroke-width="3" opacity="0.8"/>
    <text x="182" y="190" font-family="serif" font-size="28" font-weight="bold" fill="#FFF9F2" text-anchor="middle">物</text>
    
    <!-- 封面装饰 - 底部 -->
    <rect x="120" y="260" width="124" height="44" rx="22" fill="#FFF9F2" opacity="0.9"/>
    <text x="182" y="288" font-family="sans-serif" font-size="16" fill="#4A7C5C" text-anchor="middle" font-weight="500">档案·守护</text>
    
    <!-- 书页效果 -->
    <rect x="76" y="16" width="8" height="300" rx="4" fill="#FFF9F2" opacity="0.6"/>
  </g>
  
  <!-- 底部装饰元素 - 小叶子 -->
  <g transform="translate(380, 380)" opacity="0.6">
    <path d="M0 30 Q 20 0 50 10 Q 40 40 0 30 Z" fill="#6B9B7D"/>
    <path d="M20 25 Q 40 15 55 25" stroke="#4A7C5C" stroke-width="2" fill="none"/>
  </g>
  <g transform="translate(70, 400)" opacity="0.5">
    <path d="M0 20 Q 15 -5 35 5 Q 28 30 0 20 Z" fill="#B8956A"/>
  </g>
</svg>
