    function handleChatInputKeydown(event, itemId) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendChatFromInput(itemId);
      }
    }

    function autoResizeChatInput(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    }

    function sendChatFromInput(itemId) {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      if (message) {
        sendChatMessage(itemId, message);
        input.value = '';
        input.style.height = 'auto';
      }
    }

    let voiceRecognition = null;
    let isVoiceActive = false;

    function toggleVoiceInput(itemId) {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        showToast('您的浏览器不支持语音识别，请使用Chrome浏览器');
        return;
      }

      if (isVoiceActive) {
        stopVoiceInput();
        return;
      }

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      voiceRecognition = new SpeechRecognition();
      voiceRecognition.lang = 'zh-CN';
      voiceRecognition.continuous = false;
      voiceRecognition.interimResults = false;

      voiceRecognition.onstart = () => {
        isVoiceActive = true;
        document.getElementById('voiceBtn').classList.add('active');
        document.getElementById('voiceStatus').style.display = 'flex';
      };

      voiceRecognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        const input = document.getElementById('chatInput');
        input.value = transcript;
        autoResizeChatInput(input);
        stopVoiceInput();
      };

      voiceRecognition.onerror = (event) => {
        console.error('Voice recognition error:', event.error);
        stopVoiceInput();
        if (event.error !== 'no-speech') {
          showToast('语音识别出错，请重试');
        }
      };

      voiceRecognition.onend = () => {
        stopVoiceInput();
      };

      voiceRecognition.start();
    }

    function stopVoiceInput() {
      if (voiceRecognition) {
        voiceRecognition.stop();
        voiceRecognition = null;
      }
      isVoiceActive = false;
      const voiceBtn = document.getElementById('voiceBtn');
      const voiceStatus = document.getElementById('voiceStatus');
      if (voiceBtn) voiceBtn.classList.remove('active');
      if (voiceStatus) voiceStatus.style.display = 'none';
    }

    function showGuideStep(step) {
      const guides = ONBOARDING_GUIDES[AppState.onboardingPerspective] || ONBOARDING_GUIDES.newlywed;
      if (step > guides.length) {
        completeOnboarding();
        return;
      }

      const guide = guides[step - 1];
      const totalSteps = guides.length;

      let overlay = document.getElementById('onboardingOverlay');
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'onboardingOverlay';
        overlay.className = 'onboarding-overlay';
        document.body.appendChild(overlay);
      }

      overlay.innerHTML = `
        <div class="onboarding-tooltip ${step > 1 ? 'with-prev' : ''}">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <span style="font-size:12px;color:var(--color-text-light);">步骤 ${step}/${totalSteps}</span>
            <button onclick="skipOnboarding()" style="background:none;border:none;color:var(--color-text-light);cursor:pointer;font-size:12px;">跳过</button>
          </div>
          <div style="width:56px;height:56px;background:linear-gradient(135deg,var(--color-primary-soft),var(--color-cream));border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
            <i data-lucide="${guide.icon}" style="width:28px;height:28px;color:var(--color-primary);"></i>
          </div>
          <h3 style="font-size:18px;font-weight:700;color:var(--color-text);margin-bottom:8px;">${guide.title}</h3>
          <p style="font-size:13px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:24px;">${guide.desc}</p>
          <div style="display:flex;gap:10px;">
            ${step > 1 ? `
              <button onclick="showGuideStep(${step - 1})" class="btn btn-secondary btn-sm" style="flex:1;">
                <i data-lucide="arrow-left" style="width:14px;height:14px;"></i>
                上一步
              </button>
            ` : '<div style="flex:1;"></div>'}
            <button onclick="${guide.action}; showGuideStep(${step + 1});" class="btn btn-primary btn-sm" style="flex:1;">
              ${step === totalSteps ? '完成' : '下一步'}
              <i data-lucide="${step === totalSteps ? 'check' : 'arrow-right'}" style="width:14px;height:14px;"></i>
            </button>
          </div>
        </div>
        <div class="onboarding-progress">
          ${Array(totalSteps).fill(0).map((_, i) => `
            <div class="progress-dot ${i + 1 === step ? 'active' : ''} ${i + 1 < step ? 'completed' : ''}"></div>
          `).join('')}
        </div>
      `;

      overlay.classList.add('active');
      lucide.createIcons();
      AppState.onboardingStep = step;
    }

    function skipOnboarding() {
      const overlay = document.getElementById('onboardingOverlay');
      if (overlay) {
        overlay.classList.remove('active');
        setTimeout(() => overlay.remove(), 300);
      }
      AppState.onboardingStep = 0;
      AppState.hasSeenOnboarding = true;
      localStorage.setItem('hasSeenOnboarding', 'true');
      renderPage();
    }

    function completeOnboarding() {
      const overlay = document.getElementById('onboardingOverlay');
      if (overlay) {
        overlay.classList.remove('active');
        setTimeout(() => overlay.remove(), 300);

      AppState.onboardingStep = 0;
      AppState.hasSeenOnboarding = true;

    async function sendChatMessage(itemId, question) {
      const item = AppState.items.find(i => i.id === itemId);
      const chatKey = `chat-${itemId}`;
      const scripts = AI_SCRIPTS[`${item.brand}_${item.model}`] || AI_SCRIPTS[item.name] || {};
      const script = scripts[question];

      if (!AppState.chatHistory[chatKey]) {
        AppState.chatHistory[chatKey] = [];
      }

      AppState.chatHistory[chatKey].push({ role: 'user', content: question });

      const messagesContainer = document.getElementById('chatMessages');
      messagesContainer.innerHTML += `
        <div class="chat-message user">
          <div class="chat-bubble">${question}</div>
        </div>
      `;

      messagesContainer.innerHTML += `
        <div class="chat-message ai" id="aiLoading">
          <div class="ai-loading">
            <span style="font-size:13px;color:var(--color-text-secondary);">正在分析</span>
            <div class="ai-loading-dots">
              <div class="ai-loading-dot"></div>
              <div class="ai-loading-dot"></div>
              <div class="ai-loading-dot"></div>
            </div>
          </div>
        </div>
      `;

      messagesContainer.scrollTop = messagesContainer.scrollHeight;

      let aiReply = null;
      let usedRealAI = false;

      try {
        const response = await fetch('/api/ai-chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: question,
            category: item.category,
            itemName: item.name,
            brand: item.brand,
            model: item.model
          })
        });

        const data = await response.json();

        if (data.limited) {
          aiReply = data.error;
        } else if (data.reply && data.fromAI) {
          aiReply = data.reply;
          usedRealAI = true;
        }
      } catch (e) {
        console.log('API调用失败，使用脚本模拟');
      }

      const baseDelay = usedRealAI ? 300 : 1200;

      setTimeout(() => {
        const loadingEl = document.getElementById('aiLoading');
        if (loadingEl) loadingEl.remove();

        let finalResponse = aiReply;
        let actionsHtml = '';

        if (!finalResponse && script) {
          finalResponse = script.response;
          if (script.actions && script.actions.length > 0) {
            actionsHtml = `
              <div class="chat-actions">
                ${script.actions.map(action => `
                  <button class="chat-action-btn ${action.type === 'success' ? '' : 'primary'}" onclick="handleChatAction('${itemId}', '${action.text}', '${action.type}')">${action.text}</button>
                `).join('')}
              </div>
            `;
          }
          AppState.chatHistory[chatKey].push({ role: 'ai', content: script.response });
        } else if (finalResponse) {
          AppState.chatHistory[chatKey].push({ role: 'ai', content: finalResponse });
          actionsHtml = `
            <div class="chat-actions">
              <button class="chat-action-btn" onclick="handleChatAction('${itemId}', '问题解决了', 'success')">问题解决了</button>
              <button class="chat-action-btn primary" onclick="handleChatAction('${itemId}', '预约师傅上门', 'service')">预约师傅上门</button>
            </div>
          `;
        } else {
          finalResponse = `抱歉，${item.name} 的相关问题我暂时没有资料。建议您联系官方客服获取帮助。`;
        }

        const aiHtml = finalResponse.replace(/\n/g, '<br>') + actionsHtml;

        messagesContainer.innerHTML += `
          <div class="chat-message ai">
            <div class="chat-bubble">${aiHtml}</div>
          </div>
        `;

        lucide.createIcons();
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }, baseDelay);
    }

    function handleChatAction(itemId, action, type) {
      if (type === 'success') {
        showToast('太好了，问题解决了！');
      } else if (action.includes('预约') || action.includes('联系')) {
        showToast('已为您预约，师傅将在24小时内联系');
      } else if (action.includes('维修')) {

      }
      navigateTo('item', { id: itemId });
    }

    function removeIdle(idleId) {
      const idleItem = AppState.idleItems.find(i => i.id === idleId);
      if (idleItem && idleItem.itemId) {
        const item = AppState.items.find(i => i.id === idleItem.itemId);
        if (item) {
          item.isIdle = false;
        }
      }
      AppState.idleItems = AppState.idleItems.filter(i => i.id !== idleId);
      showToast('已下架');
      navigateTo('idle');
    }

    function requestBorrow(idleId) {
      showModal(`
        <div class="modal-handle"></div>
        <h3 style="font-size:18px;font-weight:600;margin-bottom:16px;">申请借用</h3>
        <div class="form-group">
          <label class="form-label">借用天数</label>
          <select class="form-select" id="borrowDays">
            <option value="7">7 天</option>
            <option value="14">14 天</option>
            <option value="30">30 天</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">留言（选填）</label>
          <textarea class="form-input" rows="3" placeholder="告诉邻居你想借用这件物品的原因..."></textarea>
        </div>
        <button class="btn btn-primary btn-block" onclick="submitBorrowRequest('${idleId}')">提交申请</button>
      `);
    }

    function submitBorrowRequest(idleId) {
      const idleItem = AppState.idleItems.find(i => i.id === idleId);
      if (idleItem) {
        idleItem.borrowRequests.push({
          id: `req-${Date.now()}`,
          user: '我',
          days: document.getElementById('borrowDays').value,
          status: 'pending'
        });
        hideModal();
        showToast('借用申请已发送');
        navigateTo('idle');
      }
    }

    function handleBorrowRequest(idleId, reqId, approved) {
      const idleItem = AppState.idleItems.find(i => i.id === idleId);
      if (idleItem) {
        idleItem.borrowRequests = idleItem.borrowRequests.filter(r => r.id !== reqId);
        if (approved) {
          idleItem.status = '已借出';
          showToast('已同意借用请求');
        } else {
          showToast('已拒绝借用请求');
        }
        navigateTo('idle-detail', { id: idleId });
      }
    }

    function showPublishIdle() {
      const idleableItems = AppState.items.filter(i => !i.isIdle && i.category !== '药品');

      if (idleableItems.length === 0) {
        showToast('暂无物品可发布闲置');

      showModal(`

        <div class="form-group">

            </label>

    }

    function publishIdle() {
      const itemId = document.getElementById('publishItemSelect').value;
      const item = AppState.items.find(i => i.id === itemId);
      if (!item) return;

      const types = [];
      if (document.getElementById('typeLend').checked) types.push('可借');
      if (document.getElementById('typeSwap').checked) types.push('可换');
      if (document.getElementById('typeGive').checked) types.push('可送');

      const newIdle = {
        id: `idle-${Date.now()}`,
        itemId: itemId,
        name: item.name,
        owner: '我',
        ownerInfo: '',
        condition: document.getElementById('publishCondition').value,
        transferType: types,
        distance: '',
        status: '可借',
        borrowRequests: []
      };

      AppState.idleItems.push(newIdle);
      item.isIdle = true;

      hideModal();
      showToast('发布成功');
      navigateTo('idle');
    }

    function renderCarePage() {
      const urgentAlerts = [];
      const familyHealthData = [];

      AppState.familyMembers.forEach(member => {
        let memberStatus = 'good';
        const memberAlerts = [];

        member.medicines.forEach(med => {
          if (med.type === 'medicine' && med.daysLeft !== undefined) {
            if (med.daysLeft <= 7) {
              memberStatus = 'urgent';
              memberAlerts.push({ type: 'danger', text: `${med.name} ${med.daysLeft}天后过期` });
            } else if (med.daysLeft <= 30) {
              if (memberStatus !== 'urgent') memberStatus = 'warning';
              memberAlerts.push({ type: 'warning', text: `${med.name} ${med.daysLeft}天后过期` });
            }
          }
          if (med.type === 'device' && med.batteryDays !== undefined) {
            if (med.batteryDays <= 7) {
              memberStatus = 'urgent';
              memberAlerts.push({ type: 'danger', text: `${med.name}电池将尽` });
            } else if (med.batteryDays <= 14) {
              if (memberStatus !== 'urgent') memberStatus = 'warning';
              memberAlerts.push({ type: 'warning', text: `${med.name}电池需更换` });
            }
          }
          if (med.maintenanceOverdue) {
            memberStatus = 'urgent';
            memberAlerts.push({ type: 'danger', text: `${med.name}需保养` });
          }
        });

        familyHealthData.push({
          member,
          status: memberStatus,
          alerts: memberAlerts
        });
      });

      const allOk = familyHealthData.every(d => d.status === 'good');

      return `

                </div>
              </div>
            </div>
          </div>

          ${familyHealthData.map(data => `
            <div class="family-member-card" style="border-left:4px solid ${data.status === 'urgent' ? 'var(--color-accent)' : data.status === 'warning' ? 'var(--color-honey)' : 'var(--color-primary)'};">

                <div class="alert-card ${alert.type}" style="margin-bottom:10px;">
                  <div class="alert-icon">
                    <i data-lucide="${alert.type === 'danger' ? 'alert-circle' : 'clock'}" style="width:20px;height:20px;"></i>

                </div>

            </div>
          </div>
        </div>
      `;
    }

    function simulateAIRecognition() {

    async function startCameraCapture() {
      const picker = document.getElementById('imagePicker');
      const container = document.getElementById('addFormContainer');
      const result = document.getElementById('recognitionResult');

      picker.style.display = 'none';
      container.style.display = 'block';

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: 'environment' },
          audio: false 
        });
        
        container.innerHTML = `
          <div style="text-align:center;">
            <div style="position:relative;width:100%;max-width:400px;margin:0 auto;">
              <video id="cameraVideo" autoplay playsinline style="width:100%;border-radius:var(--radius-lg);background:black;"></video>
              <div style="position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.5);color:white;padding:6px 12px;border-radius:20px;font-size:12px;">
                <i data-lucide="camera" style="width:14px;height:14px;margin-right:4px;"></i>
                点击拍照
              </div>
            </div>
            <div style="margin-top:20px;">
              <button class="btn btn-primary btn-block" style="padding:16px;font-size:16px;" onclick="capturePhoto()">
                <i data-lucide="camera" style="width:24px;height:24px;"></i>
                拍照识别
              </button>
              <button class="btn btn-secondary btn-block" style="margin-top:12px;" onclick="useUpload()">
                <i data-lucide="image" style="width:18px;height:18px;"></i>
                选择图片上传
              </button>
            </div>
          </div>
        `;
        lucide.createIcons();

        const video = document.getElementById('cameraVideo');
        video.srcObject = stream;
        
        window.currentCameraStream = stream;
      } catch (err) {
        useUpload();
      }
    }

    function capturePhoto() {
      const video = document.getElementById('cameraVideo');
      if (!video || !video.srcObject) {
        useUpload();
        return;
      }

      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
      
      if (window.currentCameraStream) {
        window.currentCameraStream.getTracks().forEach(track => track.stop());
        window.currentCameraStream = null;
      }

      processImageForRecognition();
    }

    function useUpload() {
      if (window.currentCameraStream) {
        window.currentCameraStream.getTracks().forEach(track => track.stop());
        window.currentCameraStream = null;
      }
      
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = (e) => {
        if (e.target.files && e.target.files[0]) {
          processImageForRecognition();
        }
      };
      input.click();
    }

    // ==================== 初始化 ====================
    function init() {
      window.addEventListener('hashchange', () => {
        const hash = window.location.hash.slice(2) || 'login';
        const [page, id] = hash.split('/');
        if (['login', 'register', 'forgot-password', 'privacy', 'home', 'archives', 'idle', 'profile', 'member', 'care', 'about', 'add'].includes(page)) {
          navigateTo(page);
        } else if (page === 'item' && id) {
          navigateTo('item', { id });
        } else if (page === 'chat' && id) {
          navigateTo('chat', { id });
        } else if (page === 'idle-detail' && id) {
          navigateTo('idle-detail', { id });
        } else if (page === 'legacy' && id) {
          navigateTo('legacy', { id });
        } else {
          navigateTo('login');
        }
      });

      const savedUserId = localStorage.getItem('wuli_current_user');
      if (savedUserId) {
        const users = JSON.parse(localStorage.getItem('wuli_users') || '[]');
        const savedUser = users.find(u => u.id === savedUserId);
        if (savedUser) {
          AppState.user = savedUser;
          AppState.isLoggedIn = true;
          AppState.currentPage = 'home';
        }
      }

      const initialHash = window.location.hash.slice(2) || (AppState.isLoggedIn ? 'home' : 'login');
      const [page, id] = initialHash.split('/');
      if (['login', 'register', 'forgot-password', 'privacy', 'home', 'archives', 'idle', 'profile', 'member', 'care', 'about', 'add'].includes(page)) {
        navigateTo(page);
      } else if (page === 'item' && id) {
        navigateTo('item', { id });
      } else if (page === 'chat' && id) {
        navigateTo('chat', { id });
      } else if (page === 'idle-detail' && id) {
        navigateTo('idle-detail', { id });
      } else if (page === 'legacy' && id) {
        navigateTo('legacy', { id });
      } else {
        navigateTo(AppState.isLoggedIn ? 'home' : 'login');
      }

      lucide.createIcons();
      setTimeout(initCaptcha, 100);

      // Service Worker注册
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered'))
          .catch(err => console.log('SW registration failed'));
      }

      // 全局错误处理
      window.addEventListener('error', (e) => {
        console.error('Global error:', e.error);
        showGlobalError('页面出现错误，请刷新重试');
      });

      window.addEventListener('unhandledrejection', (e) => {
        console.error('Unhandled promise rejection:', e.reason);
        showGlobalError('网络请求失败，请检查网络连接');
      });

      // PWA安装提示
      setupPWAInstallPrompt();

      // 隐藏加载动画
      const loadingEl = document.getElementById('appLoading');
      if (loadingEl) {
        loadingEl.classList.add('hidden');
        setTimeout(() => loadingEl.remove(), 300);
      }
    }

    function showGlobalError(message) {
      let toast = document.getElementById('globalErrorToast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'globalErrorToast';
        toast.className = 'global-error-toast';
        document.body.appendChild(toast);
      }
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    function setupPWAInstallPrompt() {
      let deferredPrompt = null;

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;

        // 检查是否已经安装
        if (window.matchMedia('(display-mode: standalone)').matches) return;
        if (localStorage.getItem('pwaInstallDismissed')) return;

        // 显示安装提示
        setTimeout(() => {
          showPWAInstallBanner(deferredPrompt);
        }, 3000);
      });
    }

    function showPWAInstallBanner(deferredPrompt) {
      let banner = document.getElementById('pwaInstallBanner');
      if (banner) return;

      banner = document.createElement('div');
      banner.id = 'pwaInstallBanner';
      banner.className = 'pwa-install-banner';
      banner.innerHTML = `
        <div class="pwa-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <div class="pwa-text">
          <div class="pwa-text-title">添加到桌面</div>
          <div class="pwa-text-desc">像原生App一样使用物历</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="installPWA(this)">安装</button>
        <button class="pwa-close" onclick="dismissPWAInstall()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      `;
      document.body.appendChild(banner);

      // 保存deferredPrompt到全局
      window._deferredPrompt = deferredPrompt;

      setTimeout(() => banner.classList.add('show'), 100);
    }

    function installPWA(btn) {
      const prompt = window._deferredPrompt;
      if (!prompt) return;

      prompt.prompt();
      prompt.userChoice.then((result) => {
        if (result.outcome === 'accepted') {
          showToast('正在安装...');
        }
        window._deferredPrompt = null;
        dismissPWAInstall();
      });
    }

    function dismissPWAInstall() {
      const banner = document.getElementById('pwaInstallBanner');
      if (banner) {
        banner.classList.remove('show');
        setTimeout(() => banner.remove(), 400);
      }
      localStorage.setItem('pwaInstallDismissed', 'true');
    }

    // 分享功能
    function shareApp() {
      const shareData = {
        title: '物历 WùLì - 物品数字档案',
        text: '一物一档，让每件物品都有专属数字档案。AI管家、闲置流转、家庭守护，全方位管理你的物品。',
        url: window.location.href
      };

      if (navigator.share) {
        navigator.share(shareData).catch(() => {});
      } else {
        // 复制链接到剪贴板
        navigator.clipboard.writeText(window.location.href).then(() => {
          showToast('链接已复制，快去分享给朋友吧！');
        }).catch(() => {
          showToast('分享功能暂不可用');
        });
      }
    }

    function initCaptcha() {
      const canvases = ['loginCaptchaCanvas', 'regCaptchaCanvas', 'forgotCaptchaCanvas'];
      canvases.forEach(id => {
        const canvas = document.getElementById(id);
        if (canvas) {
          drawCaptcha(id);
        }
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
